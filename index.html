<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="Spark Field"/>
<meta name="theme-color" content="#0f0f0f"/>
<link rel="manifest" href="manifest.json"/>
<script>
// v48 early PWA/offline registration for iOS Safari and GitHub Pages.
// This runs before the heavy app scripts, so sw.js can install and cache the app shell sooner.
(function(){
  if(!('serviceWorker' in navigator) || location.protocol === 'file:') return;
  var swUrl = new URL('sw.js', location.href).href;
  navigator.serviceWorker.register(swUrl, {scope:'./'}).then(function(reg){
    if(reg.waiting) reg.waiting.postMessage({type:'SKIP_WAITING'});
    return navigator.serviceWorker.ready;
  }).then(function(){
    if(navigator.serviceWorker.controller){
      navigator.serviceWorker.controller.postMessage({
        type:'CACHE_URLS',
        urls:[location.href, location.origin + location.pathname, './', './index.html', './manifest.json', './jszip.min.js']
      });
    }
  }).catch(function(){});
})();
</script>
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="application-name" content="Spark Field"/>
<meta name="msapplication-TileColor" content="#0f0f0f"/>
<title>Spark Field Estimator</title>
<style>
:root{
  --brand:#C84B00;
  --brand-d:#9E3900;
  --brand-glow:rgba(200,75,0,.18);
  --surface:#0f0f0f;
  --card:#181818;
  --card2:#202020;
  --border:rgba(255,255,255,.08);
  --border2:rgba(255,255,255,.13);
  --text:#f0ede8;
  --muted:#8a857e;
  --muted2:#5a5550;
  --green:#22c55e;
  --green-d:rgba(34,197,94,.12);
  --red:#ef4444;
  --red-d:rgba(239,68,68,.12);
  --amber:#f59e0b;
  --r:12px;
  --r-sm:8px;
}

html[data-theme="light"]{
  --surface:#f5f4f0;
  --card:#ffffff;
  --card2:#f0ede8;
  --border:rgba(0,0,0,.09);
  --border2:rgba(0,0,0,.14);
  --text:#1a1a1a;
  --muted:#6b6560;
  --muted2:#9e9990;
  --green:#1a7a4a;
  --green-d:rgba(26,122,74,.1);
  --red:#c0392b;
  --red-d:rgba(192,57,43,.1);
  --topbar-bg:#1a1a1a;
}

/* Light mode specific overrides */
html[data-theme="light"] #topbar,
html[data-theme="light"] #nav,
html[data-theme="light"] #drawer-top{
  background:#1a1a1a;
}
html[data-theme="light"] .drawer-proj:active{background:rgba(0,0,0,.04)}
html[data-theme="light"] .drawer-proj.active{background:rgba(200,75,0,.08)}
html[data-theme="light"] .group-header:active{background:rgba(0,0,0,.03)}
html[data-theme="light"] .room-card-header.open::after{background:rgba(0,0,0,.09)}
html[data-theme="light"] .qty-input{background:#ffffff}
html[data-theme="light"] #drawer{border-right:1px solid rgba(0,0,0,.1)}

/* Theme toggle button */
/* iOS-style theme toggle switch */
.theme-switch{
  display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;flex-shrink:0;
}
.theme-switch-track{
  position:relative;width:46px;height:26px;border-radius:13px;
  background:#444;transition:background .25s ease;flex-shrink:0;
}
html[data-theme="light"] .theme-switch-track{background:#e0ddd8;}
.theme-switch-track::after{
  content:'';position:absolute;top:3px;left:3px;
  width:20px;height:20px;border-radius:50%;background:#fff;
  box-shadow:0 1px 4px rgba(0,0,0,.35);
  transition:transform .25s ease;
}
html[data-theme="light"] .theme-switch-track::after{transform:translateX(20px);background:#1a1a1a;}
.theme-switch-icon{font-size:13px;line-height:1;opacity:.85;color:#fff;}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--surface);overscroll-behavior:none}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;color:var(--text)}
input,button,select,textarea{font-family:inherit}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
::-webkit-scrollbar{width:0;height:0}

/* === APP SHELL === */
#shell{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* === TOP BAR === */
#topbar{
  background:var(--card);
  border-bottom:1px solid var(--border);
  padding:env(safe-area-inset-top,0) 0 0;
  flex-shrink:0;
  z-index:20;
  position:relative;
}
#topbar-inner{display:flex;align-items:center;gap:10px;padding:12px 14px 13px}
#logo-img{height:22px;filter:brightness(0) invert(1);opacity:.85;flex-shrink:0}
#proj-name{flex:1;font-size:14px;font-weight:600;color:#f0ede8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#proj-total{font-size:11px;font-weight:700;color:var(--brand);letter-spacing:.04em;white-space:nowrap}
.topbar-icon-btn{background:none;border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.55);padding:6px 8px;border-radius:var(--r-sm);cursor:pointer;font-size:14px;line-height:1;display:flex;align-items:center;transition:all .15s}
.topbar-icon-btn:active{border-color:var(--brand);color:var(--brand)}
.theme-switch-icon{font-size:13px;line-height:1;opacity:.85;}

/* PROGRESS STRIP */
#progress-strip{height:2px;background:var(--border)}
#progress-fill{height:2px;background:var(--brand);transition:width .5s ease;width:0}
#progress-meta{display:flex;justify-content:space-between;padding:5px 14px 8px;font-size:10px;color:rgba(255,255,255,.38);letter-spacing:.04em}

/* === NAV TABS === */
#nav{
  display:flex;
  background:var(--card);
  border-top:1px solid var(--border);
  flex-shrink:0;
  padding-bottom:env(safe-area-inset-bottom,0);
}
.nav-tab{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:9px 4px 7px;background:none;border:none;color:var(--muted2);
  font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;
  transition:color .15s;position:relative;
}
.nav-tab.active{color:var(--brand)}
.nav-tab svg{width:20px;height:20px;stroke-width:1.7;stroke:currentColor;fill:none}
.nav-tab .nav-dot{
  position:absolute;top:7px;right:calc(50% - 14px);
  width:6px;height:6px;border-radius:50%;background:var(--brand);
  display:none;
}
.nav-tab .nav-dot.show{display:block}

/* === SCROLL AREA === */
#main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* === ROOMS TAB === */
.walk-header{padding:16px 14px 8px;display:flex;align-items:center;justify-content:space-between}
.walk-header-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.add-room-pill{
  display:flex;align-items:center;gap:5px;
  background:var(--brand);color:#fff;
  border:none;border-radius:20px;padding:6px 12px;
  font-size:11px;font-weight:700;cursor:pointer;
  letter-spacing:.03em;transition:opacity .15s;
}
.add-room-pill:active{opacity:.8}

/* ROOM CARD */
.room-card{
  margin:0 10px 10px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
}
.room-card-header{
  display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;
  user-select:none;position:relative;
}
.room-card-header::after{
  content:'';position:absolute;bottom:0;left:14px;right:14px;height:1px;background:var(--border);
  display:none;
}
.room-card-header.open::after{display:block}
.room-icon{
  width:34px;height:34px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
  background:rgba(200,75,0,.12);
}
.room-info{flex:1;min-width:0}
.room-title{font-size:14px;font-weight:700;color:var(--text)}
.room-sub{font-size:11px;color:var(--muted);margin-top:1px}
.room-cost{font-size:13px;font-weight:700;color:var(--brand)}
.room-chevron{font-size:16px;color:var(--muted2);transition:transform .2s;flex-shrink:0}
.room-chevron.open{transform:rotate(90deg)}
.room-body{display:none}
.room-body.open{display:block}

/* GROUP */
.group-wrap{border-top:1px solid var(--border)}
.group-header{
  display:flex;align-items:center;gap:8px;padding:11px 14px;cursor:pointer;
  background:rgba(255,255,255,.015);user-select:none;
}
.group-header:active{background:rgba(255,255,255,.04)}
.group-done-ring{
  width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-size:9px;transition:all .15s;
}
.group-done-ring.done{background:var(--green);border-color:var(--green);color:#000}
.group-name{flex:1;font-size:12px;font-weight:600;color:var(--muted)}
.group-name.done{color:var(--green)}
.group-cost{font-size:11px;font-weight:700;color:var(--brand)}
.group-chevron{font-size:14px;color:var(--muted2);transition:transform .18s}
.group-chevron.open{transform:rotate(90deg)}
.group-body{display:none;background:var(--card2)}
.group-body.open{display:block}

/* LINE ITEM */
.line{display:flex;align-items:center;gap:10px;padding:10px 14px;border-top:1px solid var(--border)}
.chk{
  width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;
  font-size:11px;transition:all .15s;color:transparent;
}
.chk.on{background:var(--brand);border-color:var(--brand);color:#fff}
.line-info{flex:1;min-width:0;cursor:pointer}
.line-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.3}
.line-unit{font-size:10px;color:var(--muted);margin-top:2px}
.line-cost-edit{
  background:none;border:none;color:var(--muted2);font-size:10px;
  text-decoration:underline;text-underline-offset:2px;cursor:pointer;
  padding:0;
}
.line-cost-edit:active{color:var(--brand)}
.line-controls{display:flex;align-items:center;gap:6px;flex-shrink:0}
.qty-input{
  width:52px;padding:6px 4px;text-align:center;
  background:var(--card);border:1px solid var(--border2);border-radius:var(--r-sm);
  color:var(--text);font-size:13px;font-weight:600;
}
.qty-input:focus{outline:none;border-color:var(--brand)}
.line-total{font-size:11px;font-weight:700;color:var(--brand);min-width:46px;text-align:right}
.line-del{background:none;border:none;color:var(--muted2);cursor:pointer;padding:2px 3px;font-size:14px;transition:color .15s}
.line-del:active{color:var(--red)}

/* NO ACTION + ADD */
.no-action-wrap{padding:8px 14px 10px}
.no-action-btn{
  display:flex;align-items:center;gap:8px;width:100%;
  padding:9px 12px;border-radius:var(--r-sm);border:1px solid var(--border2);
  background:none;cursor:pointer;transition:all .15s;color:var(--muted);font-size:12px;font-weight:600;
}
.no-action-btn.on{border-color:var(--green);background:var(--green-d);color:var(--green)}
.add-line-wrap{padding:4px 14px 10px}
.add-line-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;width:100%;
  padding:8px;border-radius:var(--r-sm);border:1px dashed var(--border2);
  background:none;cursor:pointer;font-size:11px;color:var(--muted2);font-weight:600;transition:all .15s;
}
.add-line-btn:active{border-color:var(--brand);color:var(--brand)}

/* === PHOTOS TAB === */
.photos-wrap{padding:14px}
.photo-capture{
  display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  padding:15px;border-radius:var(--r);border:1px dashed var(--border2);
  background:none;cursor:pointer;font-size:14px;font-weight:600;color:var(--muted);
  transition:all .15s;margin-bottom:14px;
}
.photo-capture:active{border-color:var(--brand);color:var(--brand)}
/* v39: separate camera capture from local phone upload for iOS/Android */
.photo-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:14px;
}
.photo-actions .photo-capture{
  min-height:58px;
  justify-content:center;
  text-align:center;
  padding:14px 10px;
}
.photo-action-secondary{
  background:rgba(255,255,255,.06);
  border-style:solid;
}
@media (max-width:420px){
  .photo-actions{grid-template-columns:1fr;}
  .photo-actions .photo-capture{min-height:54px;}
}

.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.photo-thumb{
  position:relative;border-radius:var(--r-sm);overflow:hidden;
  aspect-ratio:1;background:var(--card2);
}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-thumb .ph-del{
  position:absolute;top:5px;right:5px;width:22px;height:22px;
  background:rgba(0,0,0,.7);border:none;border-radius:50%;color:#fff;
  font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.photo-thumb .ph-serial{
  position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.75);
  color:#fff;font-size:9px;padding:3px 5px;line-height:1.3;word-break:break-all;
}
.photo-empty{text-align:center;padding:56px 20px;color:var(--muted2)}
.photo-empty .pe-icon{font-size:40px;margin-bottom:10px}
.photo-empty .pe-title{font-size:14px;font-weight:600;color:var(--muted);margin-bottom:4px}

/* === SUMMARY TAB === */
.summary-wrap{padding:14px}
.total-hero{
  background:var(--brand);border-radius:var(--r);padding:20px;
  margin-bottom:12px;position:relative;overflow:hidden;
}
.total-hero::before{
  content:'';position:absolute;right:-20px;top:-20px;
  width:100px;height:100px;border-radius:50%;
  background:rgba(255,255,255,.06);
}
.th-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.6)}
.th-amount{font-size:40px;font-weight:800;color:#fff;letter-spacing:-.02em;margin-top:4px;line-height:1}
.th-meta{font-size:11px;color:rgba(255,255,255,.55);margin-top:6px}
.summary-room{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.sr-head{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border)}
.sr-name{font-size:13px;font-weight:700;color:var(--text)}
.sr-total{font-size:13px;font-weight:700;color:var(--brand)}
.sr-row{display:flex;align-items:flex-start;padding:9px 14px;border-bottom:1px solid var(--border);gap:8px}
.sr-row:last-child{border-bottom:none}
.sr-row-name{flex:1;font-size:12px;color:var(--muted);line-height:1.35}
.sr-row-detail{font-size:11px;color:var(--muted2)}
.sr-row-cost{font-size:12px;font-weight:700;color:var(--text);min-width:55px;text-align:right}
.no-action-tag{font-size:10px;color:var(--green);display:block;margin-top:1px}
.export-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  padding:15px;border-radius:var(--r);border:none;
  background:var(--text);color:var(--surface);font-size:14px;font-weight:700;
  cursor:pointer;margin-bottom:10px;transition:opacity .15s;letter-spacing:.01em;
}
.export-btn:active{opacity:.85}

/* === OFFER TOOLS TAB === */
.deal-wrap{padding:14px}
.deal-hero{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);margin-bottom:12px;overflow:hidden;
}
.deal-hero-head{
  background:var(--card);padding:13px 14px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.deal-hero-title{font-size:12px;font-weight:700;color:var(--text);letter-spacing:.04em;text-transform:uppercase}
.deal-badge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:10px;background:var(--brand);color:#fff;letter-spacing:.06em}
.deal-inputs{padding:14px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.deal-field{display:flex;flex-direction:column;gap:5px}
.deal-label{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
.deal-input{
  padding:10px 11px;border-radius:var(--r-sm);border:1px solid var(--border2);
  background:var(--card2);color:var(--text);font-size:14px;font-weight:600;width:100%;
}
.deal-input:focus{outline:none;border-color:var(--brand)}
.deal-result{border-top:1px solid var(--border);padding:14px}
.dr-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;font-size:13px}
.dr-row .lbl{color:var(--muted)}
.dr-row .val{font-weight:700;color:var(--text)}
.dr-row.big .val{font-size:18px;color:var(--brand)}
.dr-row.go .val{color:var(--green)}
.dr-row.nogo .val{color:var(--red)}
.dr-divider{border:none;border-top:1px solid var(--border);margin:8px 0}
.verdict{
  margin-top:12px;padding:11px 13px;border-radius:var(--r-sm);
  font-size:13px;font-weight:700;text-align:center;letter-spacing:.02em;
}
.verdict.go{background:var(--green-d);color:var(--green)}
.verdict.nogo{background:var(--red-d);color:var(--red)}
.verdict.neutral{background:var(--card2);color:var(--muted)}
.rule-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:14px;font-size:12px;color:var(--muted);line-height:1.6;
}
.rule-card strong{color:var(--text)}

.risk-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:14px;margin-bottom:12px;box-shadow:var(--shadow-soft);overflow:hidden;
}
.risk-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.risk-title{font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--text)}
.risk-pill{font-size:10px;font-weight:800;padding:4px 8px;border-radius:999px;border:1px solid var(--border2);white-space:nowrap}
.risk-pill.low{color:var(--green);background:var(--green-d);border-color:rgba(34,197,94,.25)}
.risk-pill.medium{color:var(--amber);background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.28)}
.risk-pill.high{color:var(--red);background:var(--red-d);border-color:rgba(239,68,68,.25)}
.risk-score-row{display:grid;grid-template-columns:76px 1fr;gap:12px;align-items:center;margin-bottom:12px}
.risk-score{width:72px;height:72px;border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(230,90,0,.18),rgba(255,255,255,.035));border:1px solid var(--ring)}
.risk-score strong{font-size:24px;line-height:1;color:var(--text)}
.risk-score span{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:4px}
.risk-copy{font-size:12px;color:var(--muted);line-height:1.45}
.risk-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.risk-mini{border:1px solid var(--border);border-radius:14px;padding:9px;background:rgba(255,255,255,.025)}
.risk-mini .k{font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
.risk-mini .v{font-size:14px;font-weight:800;color:var(--text);margin-top:3px}
.risk-list{display:flex;flex-direction:column;gap:7px}
.risk-flag{display:flex;gap:8px;align-items:flex-start;padding:8px;border-radius:14px;background:rgba(255,255,255,.025);border:1px solid var(--border)}
.risk-flag .dot{width:9px;height:9px;border-radius:50%;margin-top:4px;flex-shrink:0;background:var(--muted2)}
.risk-flag.high .dot{background:var(--red)}
.risk-flag.medium .dot{background:var(--amber)}
.risk-flag.low .dot{background:var(--green)}
.risk-flag b{display:block;font-size:12px;color:var(--text);margin-bottom:1px}
.risk-flag span{display:block;font-size:11px;color:var(--muted);line-height:1.35}
@media (max-width:380px){.risk-grid{grid-template-columns:1fr}.risk-score-row{grid-template-columns:64px 1fr}.risk-score{width:62px;height:62px;border-radius:18px}.risk-score strong{font-size:20px}}

.ai-card{
  background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.018));
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 18px 45px rgba(0,0,0,.16);
  backdrop-filter:blur(16px);
}
.ai-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.ai-title{font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--text)}
.ai-pill{font-size:10px;font-weight:800;padding:4px 8px;border-radius:999px;color:#fff;background:linear-gradient(135deg,var(--brand),var(--brand-2));white-space:nowrap}
.ai-copy{font-size:12px;color:var(--muted);line-height:1.45;margin-bottom:11px}
.ai-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:11px}
.ai-mini{border:1px solid var(--border);border-radius:14px;padding:9px;background:rgba(255,255,255,.025)}
.ai-mini .k{font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
.ai-mini .v{font-size:14px;font-weight:800;color:var(--text);margin-top:3px}
.ai-list{display:flex;flex-direction:column;gap:7px}
.ai-suggestion{display:flex;gap:8px;align-items:flex-start;padding:8px;border-radius:14px;background:rgba(255,255,255,.025);border:1px solid var(--border)}
.ai-rank{width:22px;height:22px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(230,90,0,.14);color:var(--brand);font-size:11px;font-weight:900}
.ai-suggestion b{display:block;font-size:12px;color:var(--text);margin-bottom:1px}
.ai-suggestion span{display:block;font-size:11px;color:var(--muted);line-height:1.35}
.ai-foot{margin-top:10px;font-size:10px;color:var(--muted2);line-height:1.35}

/* === SIDE DRAWER === */
#drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:40;display:none;backdrop-filter:blur(4px)}
#drawer{
  position:fixed;top:0;left:0;height:100%;width:80vw;max-width:300px;
  background:var(--card);z-index:50;display:flex;flex-direction:column;
  transform:translateX(-100%);transition:transform .26s cubic-bezier(.4,0,.2,1);
  border-right:1px solid var(--border);
}
#drawer.open{transform:translateX(0)}
#drawer-top{
  background:#0f0f0f;padding:calc(env(safe-area-inset-top,0) + 14px) 14px 14px;
  border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;
}
#drawer-title{font-size:15px;font-weight:700}
#drawer-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:4px}
#drawer-list{flex:1;overflow-y:auto;padding:8px 0}
.drawer-proj{
  display:flex;align-items:center;padding:12px 14px;cursor:pointer;
  border-bottom:1px solid var(--border);gap:10px;transition:background .15s;
}
.drawer-proj:active{background:rgba(255,255,255,.04)}
.drawer-proj.active{background:rgba(200,75,0,.1)}
.drawer-proj-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);flex-shrink:0}
.drawer-proj.active .drawer-proj-dot{background:var(--brand)}
.drawer-proj-name{flex:1;font-size:14px;font-weight:600;color:var(--text)}
.drawer-proj.active .drawer-proj-name{color:var(--brand)}
.drawer-proj-cost{font-size:11px;color:var(--muted);font-weight:500}
#drawer-footer{padding:12px 14px;border-top:1px solid var(--border);display:flex;gap:8px;padding-bottom:calc(12px + env(safe-area-inset-bottom,0))}
#drawer-footer button{flex:1;padding:11px;border-radius:var(--r-sm);border:none;font-size:12px;font-weight:700;cursor:pointer}
#btn-new-proj{background:var(--brand);color:#fff}
#btn-del-proj{background:rgba(239,68,68,.15);color:var(--red);display:none}

/* === MODALS === */
.modal-veil{
  position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.7);
  display:none;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(6px);
}
.modal-veil.open{display:flex}
.modal-sheet{
  background:var(--card);border-radius:16px 16px 0 0;width:100%;max-width:480px;
  padding:22px 16px calc(22px + env(safe-area-inset-bottom,0));max-height:78vh;overflow-y:auto;
  border:1px solid var(--border);border-bottom:none;
}
.modal-title{font-size:17px;font-weight:800;margin-bottom:14px;color:var(--text)}
.modal-input{
  width:100%;padding:12px 13px;border-radius:var(--r-sm);border:1px solid var(--border2);
  background:var(--card2);color:var(--text);font-size:15px;margin-bottom:13px;
}
.modal-input:focus{outline:none;border-color:var(--brand)}
.modal-btns{display:flex;gap:9px}
.mbtn{flex:1;padding:13px;border-radius:var(--r-sm);border:none;font-size:14px;font-weight:700;cursor:pointer}
.mbtn-cancel{background:var(--card2);color:var(--muted)}
.mbtn-confirm{background:var(--brand);color:#fff}
.room-option-list{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.room-option{
  display:flex;align-items:center;gap:12px;padding:12px;
  border-radius:var(--r-sm);border:1px solid var(--border);
  background:var(--card2);cursor:pointer;transition:all .15s;
}
.room-option:active{border-color:var(--brand);background:rgba(200,75,0,.08)}
.ro-icon{font-size:22px;width:34px;text-align:center;flex-shrink:0}
.ro-name{font-size:13px;font-weight:700;color:var(--text)}
.ro-sub{font-size:11px;color:var(--muted);margin-top:1px}

/* === EMPTY STATES === */
.empty{text-align:center;padding:64px 24px;color:var(--muted2)}
.empty-icon{font-size:44px;margin-bottom:10px}
.empty-title{font-size:15px;font-weight:700;color:var(--muted);margin-bottom:5px}
.empty-sub{font-size:13px;line-height:1.5}

/* === UTIL === */
.sr-only{position:absolute;width:1px;height:1px;padding:0;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}


/* ==========================================================
   Standout visual system - v9
   Subtle, recruiter-friendly, mobile-first polish
   ========================================================== */
:root{
  --surface:#090807;
  --surface2:#12100e;
  --card:#171513;
  --card2:#211d19;
  --brand:#E65A00;
  --brand-2:#FF9B55;
  --ink:#f6f1ea;
  --shadow:0 18px 50px rgba(0,0,0,.34);
  --shadow-soft:0 10px 28px rgba(0,0,0,.20);
  --ring:rgba(230,90,0,.22);
  --r:18px;
  --r-sm:12px;
}
html[data-theme="light"]{
  --surface:#f7f3ed;
  --surface2:#fffaf4;
  --card:#fffdf9;
  --card2:#f3eee7;
  --brand:#D94E00;
  --brand-2:#F59B55;
  --ink:#16110d;
  --shadow:0 18px 48px rgba(75,48,26,.13);
  --shadow-soft:0 10px 28px rgba(75,48,26,.10);
  --ring:rgba(217,78,0,.16);
}
body{
  color:var(--text);
  background:
    radial-gradient(circle at 18% -12%, rgba(230,90,0,.18), transparent 34%),
    radial-gradient(circle at 92% 2%, rgba(255,155,85,.10), transparent 30%),
    linear-gradient(180deg,var(--surface),var(--surface2));
}
#shell{
  max-width:1180px;
  margin:0 auto;
  position:relative;
  background:linear-gradient(180deg,rgba(255,255,255,.018),rgba(255,255,255,0));
}
@media (min-width:760px){
  #shell{height:calc(100vh - 28px);margin:14px auto;border:1px solid var(--border);border-radius:28px;overflow:hidden;box-shadow:var(--shadow)}
  #main{padding:10px 14px 24px}
}
#topbar{
  background:linear-gradient(135deg,#111 0%,#1d1712 60%,#321605 100%);
  border-bottom:1px solid rgba(255,255,255,.10);
  box-shadow:0 12px 32px rgba(0,0,0,.28);
}
#topbar::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(90deg,rgba(230,90,0,.18),transparent 42%),radial-gradient(circle at 84% 0,rgba(255,255,255,.10),transparent 28%);
}
#topbar-inner{position:relative;padding:14px 16px 12px;gap:12px}
#logo-img{height:26px;opacity:1;filter:none;border-radius:8px}
#proj-name{font-size:15px;font-weight:800;letter-spacing:-.01em}
#proj-total{
  color:#fff;background:linear-gradient(135deg,var(--brand),var(--brand-2));
  border:1px solid rgba(255,255,255,.20);border-radius:999px;padding:7px 10px;
  box-shadow:0 8px 24px rgba(230,90,0,.22);font-size:12px;
}
.topbar-icon-btn{border-color:rgba(255,255,255,.20);background:rgba(255,255,255,.06);color:rgba(255,255,255,.78);border-radius:12px;backdrop-filter:blur(10px)}
#progress-strip{height:5px;background:rgba(255,255,255,.08)}
#progress-fill{height:5px;background:linear-gradient(90deg,var(--brand),var(--brand-2));box-shadow:0 0 18px rgba(230,90,0,.55)}
#progress-meta{position:relative;color:rgba(255,255,255,.65);font-weight:700;padding:7px 16px 10px}
#nav{
  background:rgba(14,12,10,.88);backdrop-filter:blur(18px);border-top:1px solid rgba(255,255,255,.08);
}
.nav-tab{padding:10px 4px 8px;border-radius:16px 16px 0 0;transition:color .18s, transform .18s, background .18s}
.nav-tab.active{background:linear-gradient(180deg,rgba(230,90,0,.14),transparent);transform:translateY(-1px)}
.nav-tab.active::after{content:'';position:absolute;bottom:0;width:24px;height:3px;border-radius:999px;background:linear-gradient(90deg,var(--brand),var(--brand-2))}
.walk-hero{margin:14px 10px 12px;padding:16px;border:1px solid var(--border);border-radius:24px;background:linear-gradient(135deg,rgba(230,90,0,.18),rgba(255,255,255,.035) 46%,rgba(255,255,255,.015));box-shadow:var(--shadow-soft);position:relative;overflow:hidden}
.walk-hero::after{content:'';position:absolute;right:-38px;top:-42px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(230,90,0,.26),transparent 64%)}
.walk-kicker{font-size:10px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:var(--brand-2);margin-bottom:5px;position:relative}
.walk-title{font-size:24px;line-height:1.05;font-weight:900;letter-spacing:-.04em;color:var(--text);position:relative;max-width:360px}
.walk-sub{font-size:12px;color:var(--muted);line-height:1.45;margin-top:8px;position:relative;max-width:560px}
.walk-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px;position:relative}
.metric-card{background:rgba(255,255,255,.055);border:1px solid var(--border);border-radius:16px;padding:10px;min-width:0}
.metric-label{font-size:9px;text-transform:uppercase;letter-spacing:.11em;color:var(--muted);font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.metric-value{font-size:18px;font-weight:900;letter-spacing:-.03em;margin-top:2px;color:var(--text)}
.walk-header{padding:4px 12px 10px}
.walk-header-title{font-size:12px;color:var(--muted);letter-spacing:.10em}
.add-room-pill{border-radius:999px;padding:9px 13px;background:linear-gradient(135deg,var(--brand),var(--brand-2));box-shadow:0 10px 24px rgba(230,90,0,.20)}
.room-card{margin:0 10px 12px;border-radius:22px;background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.015)),var(--card);box-shadow:var(--shadow-soft);border-color:var(--border2)}
.room-card-header{padding:15px 15px;gap:12px}
.room-icon{width:42px;height:42px;border-radius:15px;background:linear-gradient(135deg,rgba(230,90,0,.22),rgba(255,155,85,.08));border:1px solid var(--ring);font-size:12px;font-weight:900;letter-spacing:.05em;color:var(--brand-2);box-shadow:inset 0 0 18px rgba(230,90,0,.08)}
.room-title{font-size:15px;font-weight:850;letter-spacing:-.01em}
.room-sub{font-size:11px;color:var(--muted)}
.room-cost{background:rgba(230,90,0,.10);border:1px solid var(--ring);border-radius:999px;padding:6px 8px;font-size:12px}
.group-header{padding:12px 15px;background:linear-gradient(90deg,rgba(255,255,255,.035),transparent)}
.group-done-ring{width:21px;height:21px;border-radius:8px;color:transparent}.group-done-ring.done{color:#fff;background:linear-gradient(135deg,var(--green),#86efac)}
.group-name{font-size:12.5px}.group-cost{border-radius:999px;background:rgba(230,90,0,.10);padding:4px 7px}
.line{padding:12px 14px;gap:11px}.chk{width:24px;height:24px;border-radius:9px}.chk.on{background:linear-gradient(135deg,var(--brand),var(--brand-2));box-shadow:0 8px 18px rgba(230,90,0,.22)}
.line-name{font-size:13.5px;font-weight:650}.qty-input{border-radius:12px;height:34px;background:rgba(255,255,255,.035)}
.summary-wrap,.deal-wrap,.photos-wrap{max-width:860px;margin:0 auto;padding:14px 10px 24px}.total-hero{border-radius:24px;background:linear-gradient(135deg,#E65A00,#8F2D00);box-shadow:var(--shadow)}
.th-amount{font-size:42px}.summary-room,.deal-hero,.rule-card{border-radius:22px;background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.015)),var(--card);box-shadow:var(--shadow-soft)}
.deal-hero-head{background:linear-gradient(135deg,rgba(230,90,0,.14),transparent);padding:15px}.deal-badge{background:rgba(230,90,0,.16);color:var(--brand-2);border:1px solid var(--ring)}
.deal-inputs{gap:12px}.deal-input{border-radius:14px}.verdict{border-radius:16px;padding:13px}.export-btn{border-radius:18px;background:linear-gradient(135deg,var(--text),rgba(255,255,255,.78));box-shadow:var(--shadow-soft)}
.photo-capture{border-radius:22px;padding:18px;background:linear-gradient(135deg,rgba(230,90,0,.08),rgba(255,255,255,.03))}.photo-thumb{border-radius:18px;box-shadow:var(--shadow-soft)}
@media (min-width:820px){
  .walk-hero{padding:22px;margin:16px auto 16px;max-width:900px}.walk-title{font-size:32px}.walk-sub{font-size:13px}.walk-metrics{max-width:560px}
  #tab-rooms .room-card{max-width:900px;margin-left:auto;margin-right:auto}.walk-header{max-width:900px;margin:0 auto}

/* === v21 hero background: coded real-estate photo, not generated artwork ===
   Uses real house / real-estate photo URLs directly in CSS with strong overlays.
   Light mode keeps a warm, bright treatment; dark mode uses a deep inspection-card treatment.
   If the image cannot load, the gradient layers still keep the hero polished and readable.
*/
.walk-hero{
  isolation:isolate;
  min-height:224px;
  position:relative;
  overflow:hidden;
  background-size:cover !important;
  background-position:center right !important;
  background-repeat:no-repeat !important;
}
.walk-hero > *{
  position:relative;
  z-index:4;
}
.walk-hero::before{
  content:'';
  position:absolute;
  inset:0;
  z-index:1;
  pointer-events:none;
}
.walk-hero::after{
  content:'';
  position:absolute;
  inset:0;
  z-index:3;
  pointer-events:none;
  opacity:.95;
}

/* Dark theme: realistic home background with dark overlay for field-use readability */
html[data-theme="dark"] .walk-hero,
html:not([data-theme="light"]) .walk-hero{
  background-image:
    linear-gradient(90deg,rgba(8,7,6,.96) 0%,rgba(12,10,8,.90) 42%,rgba(12,10,8,.46) 100%),
    linear-gradient(180deg,rgba(0,0,0,.18),rgba(0,0,0,.58)),
    radial-gradient(circle at 92% 18%,rgba(230,90,0,.28),transparent 26%),
    url("https://images.unsplash.com/photo-1564013799919-ab600027ffc6?auto=format&fit=crop&w=1600&q=80") !important;
  border-color:rgba(255,255,255,.10);
}
html[data-theme="dark"] .walk-hero::before,
html:not([data-theme="light"]) .walk-hero::before{
  background:
    linear-gradient(135deg,rgba(230,90,0,.12),transparent 40%),
    linear-gradient(180deg,rgba(255,255,255,.03),rgba(0,0,0,.18));
}
html[data-theme="dark"] .walk-hero::after,
html:not([data-theme="light"]) .walk-hero::after{
  background:linear-gradient(90deg,rgba(0,0,0,.28),transparent 68%);
}

/* Light theme: same real-estate direction, warmer and cleaner */
html[data-theme="light"] .walk-hero{
  background-image:
    linear-gradient(90deg,rgba(255,252,247,.98) 0%,rgba(255,252,247,.92) 43%,rgba(255,248,240,.58) 100%),
    linear-gradient(180deg,rgba(255,255,255,.18),rgba(244,225,207,.34)),
    radial-gradient(circle at 92% 18%,rgba(217,78,0,.16),transparent 28%),
    url("https://images.unsplash.com/photo-1560518883-ce09059eeffa?auto=format&fit=crop&w=1600&q=80") !important;
  border-color:rgba(98,45,18,.13);
}
html[data-theme="light"] .walk-hero::before{
  background:
    linear-gradient(135deg,rgba(217,78,0,.08),transparent 44%),
    linear-gradient(180deg,rgba(255,255,255,.22),rgba(255,255,255,.04));
}
html[data-theme="light"] .walk-hero::after{
  background:linear-gradient(90deg,rgba(255,255,255,.26),transparent 70%);
}

@media (max-width:640px){
  .walk-hero{
    min-height:210px;
    background-position:center right !important;
  }
  html[data-theme="dark"] .walk-hero,
  html:not([data-theme="light"]) .walk-hero{
    background-image:
      linear-gradient(90deg,rgba(8,7,6,.98) 0%,rgba(10,9,8,.94) 58%,rgba(10,9,8,.62) 100%),
      linear-gradient(180deg,rgba(0,0,0,.12),rgba(0,0,0,.60)),
      radial-gradient(circle at 92% 18%,rgba(230,90,0,.22),transparent 27%),
      url("https://images.unsplash.com/photo-1564013799919-ab600027ffc6?auto=format&fit=crop&w=1200&q=75") !important;
  }
  html[data-theme="light"] .walk-hero{
    background-image:
      linear-gradient(90deg,rgba(255,252,247,.98) 0%,rgba(255,252,247,.94) 60%,rgba(255,248,240,.68) 100%),
      linear-gradient(180deg,rgba(255,255,255,.16),rgba(244,225,207,.38)),
      radial-gradient(circle at 92% 18%,rgba(217,78,0,.14),transparent 28%),
      url("https://images.unsplash.com/photo-1560518883-ce09059eeffa?auto=format&fit=crop&w=1200&q=75") !important;
  }
  .walk-title{max-width:330px;}
  .walk-sub{max-width:360px;}
}
@media (max-width:420px){
  .walk-hero{background-position:center center !important;}
}



/* === v22 app-wide subtle background: remove hero photo, use coded theme background ===
   No external photos. The background is CSS-only so it works offline and stays subtle.
*/
body{
  background:
    radial-gradient(circle at 12% 8%,rgba(230,90,0,.16),transparent 28%),
    radial-gradient(circle at 88% 18%,rgba(255,155,85,.10),transparent 30%),
    linear-gradient(135deg,rgba(255,255,255,.025) 0 1px,transparent 1px),
    linear-gradient(45deg,rgba(255,255,255,.018) 0 1px,transparent 1px),
    linear-gradient(180deg,#080706 0%,#11100e 52%,#17130f 100%) !important;
  background-size:auto,auto,34px 34px,34px 34px,auto !important;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:-1;
  background:
    linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,0) 26%),
    radial-gradient(circle at 50% 120%,rgba(230,90,0,.10),transparent 42%);
}
html[data-theme="light"] body{
  background:
    radial-gradient(circle at 12% 8%,rgba(217,78,0,.12),transparent 30%),
    radial-gradient(circle at 88% 18%,rgba(245,155,85,.12),transparent 30%),
    linear-gradient(135deg,rgba(140,86,42,.045) 0 1px,transparent 1px),
    linear-gradient(45deg,rgba(140,86,42,.030) 0 1px,transparent 1px),
    linear-gradient(180deg,#fbf7f1 0%,#f3eadf 55%,#eadccb 100%) !important;
  background-size:auto,auto,34px 34px,34px 34px,auto !important;
}
html[data-theme="light"] body::before{
  background:
    linear-gradient(180deg,rgba(255,255,255,.62),rgba(255,255,255,0) 30%),
    radial-gradient(circle at 50% 118%,rgba(217,78,0,.08),transparent 44%);
}

/* Hero is now a clean dashboard card, not a photo card. */
.walk-hero,
html[data-theme="dark"] .walk-hero,
html:not([data-theme="light"]) .walk-hero,
html[data-theme="light"] .walk-hero{
  min-height:auto !important;
  background-image:none !important;
  background-size:auto !important;
  background-position:initial !important;
  background-repeat:initial !important;
  border:1px solid var(--border2) !important;
  overflow:hidden !important;
}
html[data-theme="dark"] .walk-hero,
html:not([data-theme="light"]) .walk-hero{
  background:
    radial-gradient(circle at 92% 12%,rgba(230,90,0,.20),transparent 28%),
    linear-gradient(135deg,rgba(230,90,0,.12),rgba(255,255,255,.035) 38%,rgba(255,255,255,.018) 100%),
    rgba(17,15,13,.88) !important;
  box-shadow:0 18px 48px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.055) !important;
}
html[data-theme="light"] .walk-hero{
  background:
    radial-gradient(circle at 92% 12%,rgba(217,78,0,.12),transparent 30%),
    linear-gradient(135deg,rgba(255,255,255,.94),rgba(255,250,244,.80) 45%,rgba(244,229,214,.66) 100%) !important;
  box-shadow:0 18px 44px rgba(75,48,26,.12), inset 0 1px 0 rgba(255,255,255,.70) !important;
}
.walk-hero::before{
  content:'' !important;
  position:absolute !important;
  inset:0 !important;
  z-index:1 !important;
  pointer-events:none !important;
  background:
    linear-gradient(90deg,rgba(230,90,0,.10),transparent 38%),
    repeating-linear-gradient(135deg,rgba(255,255,255,.035) 0 1px,transparent 1px 14px) !important;
  opacity:.42 !important;
}
html[data-theme="light"] .walk-hero::before{
  background:
    linear-gradient(90deg,rgba(217,78,0,.08),transparent 42%),
    repeating-linear-gradient(135deg,rgba(85,55,32,.045) 0 1px,transparent 1px 14px) !important;
  opacity:.36 !important;
}
.walk-hero::after{
  content:'' !important;
  position:absolute !important;
  right:-42px !important;
  top:-46px !important;
  left:auto !important;
  bottom:auto !important;
  width:170px !important;
  height:170px !important;
  border-radius:999px !important;
  z-index:2 !important;
  pointer-events:none !important;
  background:radial-gradient(circle,rgba(230,90,0,.22),transparent 64%) !important;
  opacity:1 !important;
}
html[data-theme="light"] .walk-hero::after{
  background:radial-gradient(circle,rgba(217,78,0,.13),transparent 64%) !important;
}
.walk-hero > *{position:relative !important;z-index:4 !important;}

/* Give cards a little separation from the new app background. */

/* === v40 Mobile Safari/Chrome viewport fix ===
   The app is a mobile-first PWA. Older mobile browser behavior around 100vh can
   hide the bottom tab bar behind the address bar. Keep one real app viewport,
   let only the content area scroll, and use dynamic viewport units when present.
*/
html,
body{
  width:100%;
  height:100%;
  min-height:100%;
  overflow:hidden !important;
  overscroll-behavior:none;
}
body{
  position:relative;
  -webkit-text-size-adjust:100%;
  touch-action:manipulation;
}
#shell{
  width:100%;
  height:100vh;
  height:100svh;
  height:100dvh;
  min-height:0;
  overflow:hidden !important;
  display:flex;
  flex-direction:column;
}
#topbar{
  flex:0 0 auto;
  position:relative !important;
  top:auto !important;
}
#main{
  flex:1 1 auto;
  min-height:0;
  overflow-y:auto !important;
  overflow-x:hidden !important;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  padding-bottom:calc(18px + env(safe-area-inset-bottom,0px));
}
#nav{
  flex:0 0 auto;
  position:relative !important;
  bottom:auto !important;
  left:auto !important;
  right:auto !important;
  z-index:25;
  padding-bottom:max(8px, env(safe-area-inset-bottom,0px));
}
@supports (-webkit-touch-callout:none){
  html,body{height:-webkit-fill-available;}
  #shell{height:-webkit-fill-available;}
}
@media (max-width:760px){
  #shell{
    max-width:none;
    margin:0 !important;
    border:0 !important;
    border-radius:0 !important;
    box-shadow:none !important;
  }
  #topbar-inner{
    padding-top:calc(10px + env(safe-area-inset-top,0px)) !important;
  }
  #progress-meta{
    padding-bottom:7px !important;
  }
  .nav-tab{
    min-height:52px;
    justify-content:center;
    padding-top:7px !important;
    padding-bottom:5px !important;
  }
  .tab-panel:last-child,
  .rooms-wrap,
  .summary-wrap,
  .photos-wrap,
  .deal-wrap{
    padding-bottom:22px !important;
  }
}

/* === v48 mobile app polish: compact PWA header, project row, single photo upload, slider icons === */
#topbar{
  padding-top:0 !important;
}
#topbar-inner{
  display:flex !important;
  align-items:center !important;
  gap:7px !important;
  padding:8px 12px 8px !important;
  min-height:52px !important;
}
.topbar-spacer{
  flex:1 1 auto !important;
  min-width:6px !important;
}
#proj-name-row{
  display:flex !important;
  align-items:center !important;
  min-height:24px !important;
  padding:0 14px 7px 58px !important;
  color:rgba(255,255,255,.86) !important;
  font-size:12px !important;
  font-weight:800 !important;
  line-height:1.15 !important;
  white-space:nowrap !important;
  overflow:hidden !important;
  text-overflow:ellipsis !important;
}
html[data-theme="light"] #proj-name-row{
  color:#24170f !important;
}
#proj-name{
  display:block !important;
  min-width:0 !important;
  overflow:hidden !important;
  white-space:nowrap !important;
  text-overflow:ellipsis !important;
}
#logo-img.spark-logo-code{
  flex:0 0 auto !important;
  width:auto !important;
  max-width:172px !important;
  height:30px !important;
  gap:6px !important;
  overflow:visible !important;
}
#logo-img.spark-logo-code .spark-logo-mark{
  width:21px !important;
  height:28px !important;
  flex:0 0 21px !important;
  background-size:auto 28px !important;
  overflow:hidden !important;
}
#logo-img.spark-logo-code .spark-logo-word{
  flex:0 0 auto !important;
  overflow:visible !important;
  white-space:nowrap !important;
}
#logo-img.spark-logo-code .spark-logo-spark,
#logo-img.spark-logo-code .spark-logo-group{
  font-size:15px !important;
  line-height:1 !important;
}
#proj-total{
  flex:0 0 auto !important;
  min-width:44px !important;
  padding:9px 10px !important;
  border-radius:16px !important;
  background:linear-gradient(135deg,#f26510,#ff9a4c) !important;
  color:#fff !important;
  text-align:center !important;
  font-size:11px !important;
  font-weight:900 !important;
  box-shadow:0 8px 18px rgba(230,90,0,.25) !important;
}
.theme-switch{
  width:48px !important;
  height:30px !important;
  flex:0 0 48px !important;
  gap:0 !important;
}
.theme-switch-icon{display:none !important;}
.theme-switch-track{
  width:48px !important;
  height:30px !important;
  border-radius:999px !important;
  padding:0 !important;
  display:block !important;
  position:relative !important;
  overflow:hidden !important;
  background:rgba(255,255,255,.16) !important;
  border:1px solid rgba(255,255,255,.18) !important;
  box-shadow:inset 0 1px 4px rgba(0,0,0,.28),0 6px 14px rgba(0,0,0,.18) !important;

const APP_VERSION='v34-review-ready';
const STORAGE_KEY='spark_v3';
const BACKUP_KEY='spark_v3_backup';
let S = { projects:[], active:null, prices:{} };

const P = () => S.projects.find(p=>p.id===S.active);
const uid = () => '_'+Math.random().toString(36).slice(2,9);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmt = n => '$'+Math.round(Number(n)||0).toLocaleString('en-US');
function fmtUnit(n){
  const x=Number(n)||0;
  if(Math.abs(x)>=100 || Number.isInteger(x))return '$'+Math.round(x).toLocaleString('en-US');
  return '$'+x.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function setSaveStatus(text){
  const el=document.getElementById('app-save-status');
  if(el)el.textContent=text;
}
function save(){
  try{
    const payload=JSON.stringify(S);
    const prev=localStorage.getItem(STORAGE_KEY);
    if(prev)localStorage.setItem(BACKUP_KEY,prev);
    localStorage.setItem(STORAGE_KEY,payload);
    localStorage.setItem('spark_last_saved',new Date().toISOString());
    setSaveStatus('Saved');
    return true;
  }catch(e){
    console.warn('Save failed',e);
    setSaveStatus('Storage issue');
    return false;
  }
}
function load(){
  try{
    const r=localStorage.getItem(STORAGE_KEY)||localStorage.getItem(BACKUP_KEY);
    if(r)S=JSON.parse(r);
  }catch(e){
    console.warn('Load failed',e);
    try{const b=localStorage.getItem(BACKUP_KEY);if(b)S=JSON.parse(b)}catch(_){}
  }
  // Ensure prices exist
  if(!S.prices)S.prices={};
  Object.entries(CATALOG).forEach(([id,d])=>{ if(!S.prices[id])S.prices[id]=d.c; });
  if(!S.projects||!S.projects.length){createProject('123 Maple St');return;}
  migrateFeatureCompliance();
  if(!S.active||!P())S.active=S.projects[0].id;
}

function migrateFeatureCompliance(){
  (S.projects||[]).forEach(p=>{
    if(p.notes===undefined)p.notes='';
    (p.rooms||[]).forEach(room=>{
      (room.groups||[]).forEach(g=>{
        if(g.name==='Doors & Trim')g.name='Doors';
        if(g.name==='Structural & Roof')g.name='Structural';
        if(g.name==='Siding & Paint')g.name='Siding';
        if(g.name==='Garage & Concrete')g.name='Garage';
        if(g.name==='Trees & Landscaping')g.name='Trees';
        if(g.name==='Doors & Closet')g.name='Doors';
      });
      if(room.typeId==='bedroom' && !(room.groups||[]).some(g=>g.tid==='closet')){
        const doors=(room.groups||[]).find(g=>g.tid==='doors');
        if(doors){
          const closetIds=new Set(['ig-12','ig-19']);
          const closetItems=(doors.items||[]).filter(it=>closetIds.has(it.id));
          doors.items=(doors.items||[]).filter(it=>!closetIds.has(it.id));
          room.groups.push({id:uid(),tid:'closet',name:'Closet',open:false,noAction:false,items:closetItems.length?closetItems:[{id:'ig-12',checked:false,qty:1,costOverride:null},{id:'ig-19',checked:false,qty:1,costOverride:null}]});
        }
      }
    });
  });
  save();
}

function itemName(it){ return it.customName||(CATALOG[it.id]||{n:it.id}).n }
function itemUnit(it){ return it.customUnit||(CATALOG[it.id]||{u:''}).u }
function itemCost(it){ return it.costOverride!==null&&it.costOverride!==undefined ? it.costOverride : (S.prices[it.id]||0); }
function lineTotal(it){ return it.checked ? itemCost(it)*(it.qty||1) : 0; }

function buildGroups(typeId){
  const tpl = ROOM_TEMPLATES[typeId];
  if(!tpl)return[];
  return tpl.groups.map(g=>({
    id:uid(), tid:g.tid, name:g.name, open:false, noAction:false,
    items: g.items.map(id=>({id,checked:false,qty:1,costOverride:null}))
  }));
}

function createProject(name){
  const id=uid();
  const rooms=[];
  ['interior','systems','exterior','kitchen','bathroom','bedroom','living'].forEach(t=>{
    rooms.push({id:uid(),typeId:t,label:ROOM_TEMPLATES[t].label,open:true,groups:buildGroups(t)});
  });
  S.projects.push({id,name,notes:'',rooms,photos:[],deal:{arv:'',purchase:'',hold:''},created:Date.now()});
  S.active=id; save();
}

function addRoom(typeId){
  const p=P();if(!p)return;
  const tpl=ROOM_TEMPLATES[typeId];if(!tpl)return;
  const same=p.rooms.filter(r=>r.typeId===typeId).length;
  const label=same>0?tpl.label+' '+(same+1):tpl.label;
  p.rooms.push({id:uid(),typeId,label,open:true,groups:buildGroups(typeId)});
  save(); renderRooms();
}

function projectTotal(p){
  let t=0;
  p.rooms.forEach(r=>r.groups.forEach(g=>{
    if(!g.noAction)g.items.forEach(it=>{ t+=lineTotal(it); });
  }));
  return t;
}
function roomTotal(room){
  let t=0;
  room.groups.forEach(g=>{ if(!g.noAction)g.items.forEach(it=>t+=lineTotal(it)); });
  return t;
}
function groupTotal(g){
  let t=0; if(!g.noAction)g.items.forEach(it=>t+=lineTotal(it)); return t;
}
function groupDone(g){ return g.noAction||g.items.some(it=>it.checked); }
function countGroups(p){
  let total=0,done=0;
  p.rooms.forEach(r=>r.groups.forEach(g=>{total++;if(groupDone(g))done++;}));
  return{total,done};
}

  currentTab=tab;
  document.querySelectorAll('.tab-panel').forEach(el=>el.classList.toggle('active',el.id==='tab-'+tab));
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));

  else if(tab==='photos')renderPhotos();
  else if(tab==='summary')renderSummary();
  else if(tab==='deal')renderDeal();
}

function updateHeader(){
  const p=P();
  document.getElementById('proj-name').textContent=p?p.name:'No project';
  document.getElementById('proj-total').textContent=p?fmt(projectTotal(p)):'$0';
  if(!p){document.getElementById('progress-fill').style.width='0';return;}
  const {total,done}=countGroups(p);
  const pct=total>0?Math.round(done/total*100):0;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-label').textContent=done+' of '+total+' groups reviewed';
  document.getElementById('progress-pct').textContent=pct+'%';
  // photo dot
  const ph=p.photos&&p.photos.length>0;
  document.getElementById('dot-photos').classList.toggle('show',ph);
}

function renderRooms(){
  const el=document.getElementById('tab-rooms');
  const p=P();
  if(!p){el.innerHTML=emptyState('','No project open','Create a project first.');return;}
  const stats=countGroups(p);
  const pct=stats.total>0?Math.round(stats.done/stats.total*100):0;
  const repairTotal=projectTotal(p);
  const photoCount=(p.photos||[]).length;
  let h=`<div class="walk-hero">
    <div class="walk-kicker">Field Walkthrough</div>
    <div class="walk-title">Fast repair scope, clean numbers, confident offer.</div>
    <div class="walk-sub">Built for real property walks: room-by-room estimates, live totals, photos, export, and deal math without leaving the house.</div>
    <div class="walk-metrics">
      <div class="metric-card"><div class="metric-label">Repair total</div><div class="metric-value">${fmt(repairTotal)}</div></div>
      <div class="metric-card"><div class="metric-label">Reviewed</div><div class="metric-value">${pct}%</div></div>
      <div class="metric-card"><div class="metric-label">Photos</div><div class="metric-value">${photoCount}</div></div>
    </div>
  </div>`;
  h+=`<div class="notes-card">
    <div class="notes-card-head">
      <div>
        <div class="notes-kicker">Project Notes</div>
        <div class="notes-title">Walkthrough context, risks, access notes, or contractor reminders</div>
      </div>
      <span class="notes-status">Saved locally</span>
    </div>
    <textarea class="project-notes" placeholder="Example: verify water heater age, roof leak over garage, seller said HVAC works but serial plate is missing..." oninput="saveProjectNotes(this.value)">${esc(p.notes||'')}</textarea>
  </div>`;
  h+='<div class="walk-header"><span class="walk-header-title">Rooms ('+p.rooms.length+')</span><button class="add-room-pill" onclick="openAddRoom()">+ Add room</button></div>';
  p.rooms.forEach(room=>{
    const rt=roomTotal(room);
    const tpl=ROOM_TEMPLATES[room.typeId]||{icon:''};
    const gDone=room.groups.filter(groupDone).length;
    h+=`<div class="room-card" id="rc_${room.id}">
      <div class="room-card-header${room.open?' open':''}" id="rch_${room.id}" onclick="toggleRoom('${room.id}')">
        <div class="room-icon">${tpl.icon}</div>
        <div class="room-info">
          <div class="room-title">${esc(room.label)}</div>
          <div class="room-sub">${gDone}/${room.groups.length} groups done</div>
        </div>
        ${rt>0?`<div class="room-cost">${fmt(rt)}</div>`:''}
        <button onclick="event.stopPropagation();removeRoom('${room.id}')" style="background:none;border:none;color:var(--muted2);cursor:pointer;padding:4px;font-size:16px">×</button>
        <div class="room-chevron${room.open?' open':''}" id="rchv_${room.id}">›</div>
      </div>
      <div class="room-body${room.open?' open':''}" id="rb_${room.id}">
        ${renderGroupsForRoom(room)}
      </div>
    </div>`;
  });
  h+='<div style="height:16px"></div>';
  el.innerHTML=h;
  updateHeader();
  renderDrawer();
}

function saveProjectNotes(value){
  const p=P();if(!p)return;
  p.notes=value;
  save();
}

function renderGroupsForRoom(room){
  let h='';
  room.groups.forEach(g=>{
    const gt=groupTotal(g);
    const done=groupDone(g);
    h+=`<div class="group-wrap">
      <div class="group-header" onclick="toggleGroup('${room.id}','${g.id}')">
        <div class="group-done-ring${done?' done':''}">${done?'✓':''}</div>
        <div class="group-name${done?' done':''}">${esc(g.name)}</div>
        ${gt>0?`<div class="group-cost">${fmt(gt)}</div>`:''}
        <div class="group-chevron${g.open?' open':''}">›</div>
      </div>
      <div class="group-body${g.open?' open':''}" id="gb_${g.id}">
        ${renderItems(room,g)}
        <div class="no-action-wrap">
          <button class="no-action-btn${g.noAction?' on':''}" onclick="event.stopPropagation();toggleNoAction('${room.id}','${g.id}')">
            <span>${g.noAction?'✓':'○'}</span> No action needed
          </button>
        </div>
        <div class="add-line-wrap">
          <button class="add-line-btn" onclick="event.stopPropagation();openAddItem('${room.id}','${g.id}')">＋ Add custom item</button>
        </div>
      </div>
    </div>`;
  });
  return h;
}

function renderItems(room,g){
  let h='';
  g.items.forEach((it,idx)=>{
    const cost=itemCost(it);
    const lt=lineTotal(it);
    h+=`<div class="line">
      <div class="chk${it.checked?' on':''}" onclick="event.stopPropagation();toggleItem('${room.id}','${g.id}',${idx})">${it.checked?'✓':''}</div>
      <div class="line-info" onclick="event.stopPropagation();toggleItem('${room.id}','${g.id}',${idx})">
        <div class="line-name">${esc(itemName(it))}</div>
        <div class="line-unit">
          <button class="line-cost-edit" onclick="event.stopPropagation();editCost('${room.id}','${g.id}',${idx})">${fmtUnit(cost)} / ${esc(itemUnit(it))}</button>
        </div>
      </div>
      <div class="line-controls">
        <input class="qty-input" type="number" min="0" step="any" value="${it.qty||1}"
          onchange="setQty('${room.id}','${g.id}',${idx},this.value)"
          onclick="event.stopPropagation()"
          style="${!it.checked?'opacity:.3':''}"/>
        <div class="line-total">${lt>0?fmt(lt):''}</div>
        <button class="line-del" onclick="event.stopPropagation();deleteItem('${room.id}','${g.id}',${idx})">×</button>
      </div>
    </div>`;
  });
  return h;
}

function toggleRoom(rid){
  const p=P();
  const room=p?.rooms.find(r=>r.id===rid);
  const body=document.getElementById('rb_'+rid);
  const hdr=document.getElementById('rch_'+rid);
  const chv=document.getElementById('rchv_'+rid);
  if(!body)return;
  const open=body.classList.toggle('open');
  if(room){room.open=open; save();}
  hdr?.classList.toggle('open',open);
  chv?.classList.toggle('open',open);
}

function toggleGroup(rid,gid){
  const p=P();if(!p)return;
  const room=p.rooms.find(r=>r.id===rid);if(!room)return;
  const g=room.groups.find(x=>x.id===gid);if(!g)return;
  g.open=!g.open; save();
  document.getElementById('gb_'+gid)?.classList.toggle('open',g.open);
  document.querySelector(`#gb_${gid}`)?.previousElementSibling?.querySelector('.group-chevron')?.classList.toggle('open',g.open);
}

function toggleItem(rid,gid,idx){
  const p=P();if(!p)return;
  const room=p.rooms.find(r=>r.id===rid);if(!room)return;
  const g=room.groups.find(x=>x.id===gid);if(!g)return;
  const it=g.items[idx];if(!it)return;
  it.checked=!it.checked;
  if(it.checked)g.noAction=false;
  save(); renderRooms();
}

function setQty(rid,gid,idx,val){

function toggleNoAction(rid,gid){

function deleteItem(rid,gid,idx){

function handlePhotos(input){
  const p=P();if(!p||!input.files||!input.files.length)return;
  if(!p.photos)p.photos=[];
  let remaining=input.files.length;
  Array.from(input.files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      // Try serial number from filename
      const serial=detectSerial(file.name);
      // Compress
      const img2=new Image();
      img2.onload=()=>{
        const canvas=document.createElement('canvas');
        const ratio=Math.min(1600/img2.width,1600/img2.height,1);
        canvas.width=Math.round(img2.width*ratio);
        canvas.height=Math.round(img2.height*ratio);
        canvas.getContext('2d').drawImage(img2,0,0,canvas.width,canvas.height);
        const data=canvas.toDataURL('image/jpeg',0.82);
        p.photos.push({data,serial,name:file.name,ts:Date.now()});
        remaining--;
        if(remaining===0){save();renderPhotos();updateHeader();}
      };
      img2.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
  input.value='';
}

function detectSerial(name){
  const m=name.match(/(?:S[\/\-]?N|SN)[:\s#-]*([A-Z0-9]{5,20})/i);
  return m?m[1]:null;
}

function delPhoto(idx){
  const p=P();if(!p||!p.photos)return;
  p.photos.splice(idx,1);save();renderPhotos();updateHeader();
}

function selectedLineItems(p){
  const out=[];
  if(!p||!p.rooms)return out;
  p.rooms.forEach(room=>{
    (room.groups||[]).forEach(g=>{
      if(g.noAction)return;
      (g.items||[]).forEach(it=>{
        if(it.checked){
          const c=itemCost(it);
          out.push({
            room:room.label, group:g.name, id:it.id, name:itemName(it), unit:itemUnit(it),
            qty:it.qty||1, cost:c, total:(it.qty||1)*c
          });
        }
      });
    });
  });
  return out;
}

function analyzeRisk(p,arv,purchase,hold){
  const repair=projectTotal(p);
  const items=selectedLineItems(p);
  const ids=new Set(items.map(x=>x.id));
  const gc=countGroups(p);
  const photos=(p.photos||[]).length;
  const basis=(purchase||0)+repair+(hold||0);
  const hiddenRisk={
    'as-01':'Furnace replacement', 'as-02':'Condensing unit', 'as-03':'Package HVAC unit', 'as-04':'A-coil', 'as-05':'Ducting',
    'as-08':'Water heater', 'as-14':'Foundation pier', 'as-15':'Structural foam injection', 'as-16':'Roof', 'as-17':'Plumbing',
    'as-18':'Electrical panel swap', 'as-19':'Full electrical rewire', 'as-20':'Full electrical rewire', 'as-21':'Wall insulation',
    'as-22':'Attic insulation', 'as-23':'Drywall to studs', 'as-24':'Aluminum wiring', 'ba-10':'Shower tear out',
    'ba-11':'Tub tile tear out', 'ba-13':'Tub tear out', 'ex-23':'Garage conversion', 'ig-25':'Demo'
  };
  const evidenceIds={
    'as-01':'furnace serial plate', 'as-02':'condensing unit serial plate', 'as-08':'water heater serial plate', 'as-16':'roof photos'
  };
  let score=12;
  const flags=[];
  const highItems=items.filter(x=>hiddenRisk[x.id]);
  if(highItems.length){
    score += Math.min(30, highItems.length*7);
    const names=highItems.slice(0,3).map(x=>hiddenRisk[x.id]).join(', ');
    flags.push({sev:'high',title:'Hidden-cost scope selected',body:names+(highItems.length>3?' + '+(highItems.length-3)+' more':'')+'. Reconfirm before making the offer.'});
  }
  const evidenceNeeded=items.filter(x=>evidenceIds[x.id]);
  if(evidenceNeeded.length && photos < evidenceNeeded.length){
    score += 14;
    flags.push({sev:'medium',title:'Photo evidence may be light',body:'Selected equipment/roof items need serial or condition photos. Capture at least '+evidenceNeeded.length+' evidence photo'+(evidenceNeeded.length>1?'s':'')+'.'});
  }
  const unreviewed=Math.max(0,(gc.total||0)-(gc.done||0));
  if(unreviewed>0){
    score += Math.min(22, unreviewed*2);
    flags.push({sev:'medium',title:'Walkthrough not fully reviewed',body:unreviewed+' group'+(unreviewed>1?'s':'')+' still unmarked. Missed groups are where surprise costs hide.'});
  }
  if(arv>0){
    const repairPct=repair/arv;
    if(repairPct>=0.28){score+=16;flags.push({sev:'high',title:'Repair load is heavy',body:'Repairs are '+(repairPct*100).toFixed(1)+'% of ARV. Add contingency or renegotiate.'});}
    else if(repairPct>=0.18){score+=8;flags.push({sev:'medium',title:'Repair load is meaningful',body:'Repairs are '+(repairPct*100).toFixed(1)+'% of ARV. Validate big-ticket assumptions.'});}
  }
  if(arv>0 && purchase>0){
    const reserve=Math.max(1500,Math.round(repair*(score>=65?0.18:score>=40?0.12:0.08)));
    const reserveProfit=arv-(basis+reserve);
    if(reserveProfit<0){score+=12;flags.push({sev:'high',title:'Contingency breaks the deal',body:'After a '+fmt(reserve)+' risk reserve, projected profit falls below zero.'});}
  }
  if(!flags.length){flags.push({sev:'low',title:'Clean initial read',body:'No major scope flags yet. Continue marking every group and upload evidence photos for major systems.'});}
  score=Math.max(0,Math.min(100,Math.round(score)));
  const level=score>=65?'high':score>=40?'medium':'low';
  const reserve=Math.max(1500,Math.round(repair*(level==='high'?0.18:level==='medium'?0.12:0.08)));
  const reserveProfit=(arv>0&&purchase>0)?arv-(basis+reserve):null;
  const confidence=gc.total?Math.round((gc.done/gc.total)*100):0;
  return {score,level,reserve,reserveProfit,confidence,photos,highItems,flags};
}


function renderRiskRadar(p,arv,purchase,hold){
  const r=analyzeRisk(p,arv,purchase,hold);
  const flagHtml=r.flags.slice(0,4).map(f=>`<div class="risk-flag ${f.sev}"><span class="dot"></span><div><b>${esc(f.title)}</b><span>${esc(f.body)}</span></div></div>`).join('');
  const reserveProfit=(r.reserveProfit===null?'--':fmt(r.reserveProfit));
  return `<div class="risk-card">

function analyzeOfflineCoach(p,arv,purchase,hold){
  const gc=countGroups(p);
  const photos=(p.photos||[]).length;
  const rooms=(p.rooms||[]);
  const routeOrder=['exterior','systems','interior','kitchen','bathroom','bedroom','living'];
  const orderLabel={exterior:'Exterior first',systems:'Systems check',interior:'Whole-house interior',kitchen:'Kitchen',bathroom:'Bathrooms',bedroom:'Bedrooms',living:'Living and common areas'};
  const route=[];
  routeOrder.forEach(type=>{
    rooms.filter(r=>r.typeId===type).forEach(room=>{
      const groups=room.groups||[];
      const remaining=groups.filter(g=>!groupDone(g));
      const done=groups.length-remaining.length;
      route.push({
        type,
        roomId:room.id,
        room:room.label||orderLabel[type]||type,
        label:orderLabel[type]||type,
        total:groups.length,
        done,
        remaining:remaining.length,
        nextGroup:remaining[0]?remaining[0].name:'Complete',
        status:remaining.length?'open':'done'
      });
    });
  });
  const openStops=route.filter(x=>x.remaining>0);
  const next=openStops[0]||null;
  const remainingGroups=openStops.reduce((a,x)=>a+x.remaining,0);
  const doneGroups=route.reduce((a,x)=>a+x.done,0);
  const totalGroups=route.reduce((a,x)=>a+x.total,0);
  const completion=totalGroups?Math.round(doneGroups/totalGroups*100):0;
  const selectedCount=selectedLineItems(p).length;
  const estMinutes=Math.max(2,Math.ceil(remainingGroups*1.4 + Math.max(0,3-photos)*0.8));
  let mode='Guided walk';
  if(completion>=90)mode='Final sweep';
  else if(remainingGroups>12)mode='Full walkthrough';
  else if(remainingGroups<=5)mode='Closeout pass';
  const prompts=[];
  function add(title,body,rank){
    if(prompts.some(x=>x.title===title))return;
    prompts.push({title,body,rank});
  }
  if(next){
    add('Next stop: '+next.room,'Open '+next.room+' and finish '+next.nextGroup+'. Mark a repair item or No action needed before moving on.',100);
  }else{
    add('Walkthrough complete','Every visible group is marked. Do a quick photo and notes check before export.',100);
  }
  const roomTypes=new Set(rooms.map(r=>r.typeId));
  ['exterior','systems','kitchen','bathroom','living'].forEach(type=>{
    if(!roomTypes.has(type))add('Add '+(orderLabel[type]||type),'This room/section is missing from the walkthrough route. Add it before export so the scope is complete.',95);
  });
  const roomsWithManyOpen=openStops.filter(x=>x.remaining>=3).slice(0,2);
  roomsWithManyOpen.forEach(x=>add('Batch review '+x.room,x.remaining+' groups are still open here. Finish this room in one pass to avoid backtracking.',82-x.remaining));
  if(photos===0 && selectedCount>0)add('Upload one anchor photo','There are selected repairs but no photos yet. Upload one wide room photo now so the export has context.',78);
  if((p.notes||'').trim().length<12)add('Leave a short field note','Add one sentence about access, utilities, odors, seller comments, or anything the spreadsheet cannot capture.',70);
  if(remainingGroups>0 && completion<60)add('Use doorway rhythm','At each doorway, scan floor, walls, doors, ceiling, then photo. This keeps the walkthrough fast and consistent.',65);
  prompts.sort((a,b)=>b.rank-a.rank);
  const visibleRoute=route.filter(x=>x.remaining>0).slice(0,5);
  if(!visibleRoute.length)visibleRoute.push(...route.slice(0,5));
  return {mode,next,remainingGroups,completion,estMinutes,prompts:prompts.slice(0,4),route:visibleRoute,photos,selectedCount,totalGroups};
}

function renderOfflineCoach(p,arv,purchase,hold){
  const c=analyzeOfflineCoach(p,arv,purchase,hold);
  const nextText=c.next?(c.next.room+' - '+c.next.nextGroup):'Final review';
  const routeHtml=c.route.map((r,i)=>`<div class="ai-suggestion"><div class="ai-rank">${i+1}</div><div><b>${esc(r.room)}</b><span>${esc(r.done+'/'+r.total+' groups done. Next: '+r.nextGroup)}</span></div></div>`).join('');
  const promptHtml=c.prompts.map((s,i)=>`<div class="ai-suggestion"><div class="ai-rank">${i+1}</div><div><b>${esc(s.title)}</b><span>${esc(s.body)}</span></div></div>`).join('');
  return `<div class="ai-card">
    <div class="ai-head"><div class="ai-title">Walkthrough Guide</div></div>
    <div class="ai-copy">Helps the agent decide what to inspect next during the walkthrough. It uses the rooms and unfinished groups already in the project, so it works even without internet.</div>
    <div class="ai-grid">
      <div class="ai-mini"><div class="k">Next stop</div><div class="v">${esc(nextText)}</div></div>
      <div class="ai-mini"><div class="k">Remaining groups</div><div class="v">${c.remainingGroups}</div></div>
      <div class="ai-mini"><div class="k">Field time left</div><div class="v">~${c.estMinutes} min</div></div>
      <div class="ai-mini"><div class="k">Route mode</div><div class="v">${esc(c.mode)}</div></div>
    </div>
    <div class="ai-copy" style="margin-top:12px;margin-bottom:8px">Suggested route</div>
    <div class="ai-list">${routeHtml}</div>
    <div class="ai-copy" style="margin-top:12px;margin-bottom:8px">Field prompts</div>
    <div class="ai-list">${promptHtml}</div>
    <div class="ai-foot">Made for field use: quick to read, works offline, and helps the agent keep moving through the house without missing rooms.</div>
  </div>`;
}

function renderDeal(){
  const el=document.getElementById('tab-deal');
  const p=P();
  if(!p){el.innerHTML=emptyState('','No project','Open a project first.');return;}
  const repair=projectTotal(p);
  const di=p.deal||{arv:'',purchase:'',hold:''};
  const arv=parseFloat(di.arv)||0;
  const purchase=parseFloat(di.purchase)||0;
  const hold=parseFloat(di.hold)||0;
  const basis=purchase+repair+hold;
  const profit=arv-basis;
  const roi=basis>0?(profit/basis*100):0;
  const mao=arv*0.7-repair;
  const hasData=arv>0&&purchase>0;
  let verdict='neutral',vtext='Enter ARV and purchase price to analyze this deal.';
  if(hasData){
    if(profit>0&&roi>=15){verdict='go';vtext='Strong deal - ROI meets 15% target.';}
    else if(profit>0){verdict='go';vtext='Marginal - verify all cost assumptions.';}
    else{verdict='nogo';vtext='Deal likely underwater at these numbers.';}
  }
  let h='<div class="deal-wrap">';
  h+=`<div class="deal-hero">
    <div class="deal-hero-head">
      <span class="deal-hero-title">Offer Worksheet</span>
          </div>
    <div class="deal-inputs">
      <div class="deal-field">
        <label class="deal-label">ARV ($)</label>
        <input class="deal-input" type="number" placeholder="185000" value="${esc(di.arv)}" oninput="saveDeal('arv',this.value)"/>
      </div>
      <div class="deal-field">
        <label class="deal-label">Purchase ($)</label>
        <input class="deal-input" type="number" placeholder="90000" value="${esc(di.purchase)}" oninput="saveDeal('purchase',this.value)"/>
      </div>
      <div class="deal-field" style="grid-column:1/-1">
        <label class="deal-label">Holding costs ($)</label>
        <input class="deal-input" type="number" placeholder="3500" value="${esc(di.hold)}" oninput="saveDeal('hold',this.value)"/>
      </div>
    </div>
    <div class="deal-result">
      <div class="dr-row"><span class="lbl">Repair estimate</span><span class="val">${fmt(repair)}</span></div>
      <div class="dr-row"><span class="lbl">Purchase price</span><span class="val">${purchase>0?fmt(purchase):'-'}</span></div>
      <div class="dr-row"><span class="lbl">Holding costs</span><span class="val">${hold>0?fmt(hold):'-'}</span></div>
      <hr class="dr-divider"/>
      <div class="dr-row"><span class="lbl">Total cost basis</span><span class="val">${basis>0?fmt(basis):'-'}</span></div>
      <div class="dr-row"><span class="lbl">ARV</span><span class="val">${arv>0?fmt(arv):'-'}</span></div>
      <div class="dr-row big"><span class="lbl" style="font-weight:700">Projected profit</span><span class="val ${hasData?(profit>=0?'go':'nogo'):''}">${hasData?fmt(profit):'-'}</span></div>
      <div class="dr-row ${roi>0?'go':roi<0?'nogo':''}"><span class="lbl">ROI</span><span class="val">${hasData?roi.toFixed(1)+'%':'-'}</span></div>
      <div class="dr-row"><span class="lbl">70% Rule MAO</span><span class="val">${arv>0?fmt(mao):'-'}</span></div>
      <div class="verdict ${verdict}">${vtext}</div>
    </div>
  </div>`;
  h+=renderRiskRadar(p,arv,purchase,hold);
  h+=renderOfflineCoach(p,arv,purchase,hold);
  h+=`<div class="rule-card">
    <strong>Offer Worksheet: how ARV is used</strong><br/>
    ARV means the estimated value of the property after repairs. In the Offer Worksheet, ARV is used to calculate the 70% Rule maximum offer: MAO = ARV x 70% - repair estimate. Then the app compares that number with the purchase price, holding costs, and repair total so the agent can see if the offer still makes sense before leaving the walkthrough.
  </div>`;
  h+='</div>';
  el.innerHTML=h;
}

function saveDeal(field,val){
  const p=P();if(!p)return;
  if(!p.deal)p.deal={};
  p.deal[field]=val;
  save();
  // Re-render just the result section without wiping inputs
  renderDeal();
}

      ['B3','B7','D7','B8','D8','B9'].forEach(a=>setNumFmt(wsSummary,a,moneyFmt));
      setNumFmt(wsSummary,'D4',pctFmt); setNumFmt(wsSummary,'D9',pctFmt);
      XLSX.utils.book_append_sheet(wb,wsSummary,'Summary');

      const repair=[['Room','Group','Repair Item','Qty','Unit','Unit Cost','Line Total']];
      checkedRows.forEach(r=>repair.push(r));
      repair.push([]);
      repair.push(['','','','','','Grand Total',total]);
      const wsRepair=XLSX.utils.aoa_to_sheet(repair);
      wsRepair['!cols']=autos([22,24,42,8,12,14,14]);
      wsRepair['!freeze']={xSplit:0,ySplit:1};
      styleRange(wsRepair,0,0,0,6,styles.header);
      for(let r=1;r<repair.length;r++){
        if(repair[r].length===0)continue;
        const st=(r===repair.length-1)?styles.total:styles.value;
        styleRange(wsRepair,r,0,r,6,st);
        setNumFmt(wsRepair,XLSX.utils.encode_cell({r,c:5}),moneyFmt);
        setNumFmt(wsRepair,XLSX.utils.encode_cell({r,c:6}),moneyFmt);
      }
      XLSX.utils.book_append_sheet(wb,wsRepair,'Repair Items');

      const risk=analyzeRisk(p,arv,purchase,hold);
      const coach=analyzeOfflineCoach(p,arv,purchase,hold);
      const tools=[

        ['Risk score',risk.score,'Level',risk.level.toUpperCase()],
        ['Suggested reserve',risk.reserve,'Reserve adjusted profit',risk.reserveProfit===null?'':risk.reserveProfit],
        ['Evidence photos',photoCount,'Walkthrough confidence',reviewedCount/totalGroups],
        [],
        ['Risk flags','','','']
      ];
      risk.flags.slice(0,6).forEach(f=>tools.push([f.title,f.sev.toUpperCase(),f.body,'']));
      tools.push([]);
      tools.push(['Walkthrough Guide','','','']);
      tools.push(['Next stop',coach.next?(coach.next.room+' - '+coach.next.nextGroup):'Final review','Remaining groups',coach.remainingGroups]);
      tools.push(['Route mode',coach.mode,'Field time left','~'+coach.estMinutes+' min']);

        }else if(arr.length){
          styleRange(wsTools,row,0,row,3,styles.value);
          if(arr[1] && ['HIGH','MED','LOW'].includes(String(arr[1]).toUpperCase())) styleRange(wsTools,row,0,row,3,styles.warn);
        }
        row++;

      ['B3','D3'].forEach(a=>setNumFmt(wsTools,a,moneyFmt));
      setNumFmt(wsTools,'D4',pctFmt);
      XLSX.utils.book_append_sheet(wb,wsTools,'Tools Notes');

      const buf=XLSX.write(wb,{bookType:'xlsx',type:'array'});

    }else{
      // Offline fallback: Excel opens this .xls HTML table even when the SheetJS CDN is unavailable.

      const htmlRows=rows.map(r=>'<tr>'+r.map(c=>'<td>'+escCell(c)+'</td>').join('')+'</tr>').join('');

document.getElementById('csv-btn').onclick=()=>document.getElementById('csv-file').click();
document.getElementById('csv-file').onchange=function(){
  const file=this.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const raw=e.target.result||'';

    function parseCSVLine(line){
      const fields=[];
      let cur='',inQuote=false;
      for(let i=0;i<line.length;i++){
        const ch=line[i];
        if(ch==='"'&&!inQuote){inQuote=true;}
        else if(ch==='"'&&inQuote&&line[i+1]==='"'){cur+='"';i++;}
        else if(ch==='"'&&inQuote){inQuote=false;}
        else if(ch===','&&!inQuote){fields.push(cur.trim());cur='';}
        else{cur+=ch;}
      }
      fields.push(cur.trim());
      return fields.map(f=>f.replace(/^\uFEFF/,'').replace(/^["']+|["']+$/g,'').trim());
    }
    function cleanHeader(h){return String(h||'').toLowerCase().trim().replace(/[^a-z0-9]+/g,'');}
    function parsePrice(v){
      const cleaned=String(v||'').replace(/[$,\s%]/g,'');
      const num=parseFloat(cleaned);
      return (!isNaN(num)&&num>=0&&num<50000)?num:null;
    }

    const rows=raw.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n')
      .map(l=>l.trim()).filter(Boolean).map(parseCSVLine);
    if(!rows.length){alert('CSV is empty. Please upload a file with id and cost columns.');return;}

    const CATALOG_IDS=new Set(Object.keys(CATALOG));
    const first=rows[0].map(cleanHeader);
    const idIdx=first.findIndex(h=>['id','itemid','repairid','lineitemid'].includes(h));
    const costIdx=first.findIndex(h=>['cost','unitcost','price','unitprice','standardprice'].includes(h));
    const nameIdx=first.findIndex(h=>['name','item','itemname','repair','repairitem'].includes(h));
    const unitIdx=first.findIndex(h=>['unit','unittype','uom'].includes(h));
    const hasHeader=idIdx>=0 && costIdx>=0;

    let n=0, skipped=0;
    const examples=[];
    const seen=new Set();

    const dataRows=hasHeader?rows.slice(1):rows;
    dataRows.forEach(fields=>{
      let foundId=null, newCost=null, newName=null, newUnit=null;

      if(hasHeader){
        foundId=String(fields[idIdx]||'').toLowerCase().trim();
        newCost=parsePrice(fields[costIdx]);
        if(nameIdx>=0)newName=String(fields[nameIdx]||'').trim();
        if(unitIdx>=0)newUnit=String(fields[unitIdx]||'').trim();
      }else{
        fields.forEach(f=>{
          const lower=String(f||'').toLowerCase().trim();
          if(CATALOG_IDS.has(lower))foundId=lower;
        });
        if(foundId){
          fields.forEach(f=>{
            if(String(f||'').toLowerCase().trim()===foundId)return;
            const num=parsePrice(f);
            if(num!==null && newCost===null)newCost=num;
          });
        }
      }

      if(!foundId||!CATALOG_IDS.has(foundId)||newCost===null){skipped++;return;}
      const oldCost=Number(S.prices?.[foundId] ?? CATALOG[foundId].c ?? 0);
      S.prices[foundId]=newCost;
      CATALOG[foundId].c=newCost;
      if(newName)CATALOG[foundId].n=newName;
      if(newUnit)CATALOG[foundId].u=newUnit;
      if(!seen.has(foundId)){
        seen.add(foundId);
        n++;
        const displayName = (newName || CATALOG[foundId].n || foundId).trim();
        const displayUnit = (newUnit || CATALOG[foundId].u || '').trim();
        const unitSuffix = displayUnit ? ` / ${displayUnit}` : '';
        if(examples.length<5)examples.push(`${displayName}: ${fmtUnit(oldCost)} → ${fmtUnit(newCost)}${unitSuffix}`);
      }
    });

    save();
    updateHeader();
    if(currentTab==='rooms')renderRooms();
    else if(currentTab==='summary')renderSummary();
    else if(currentTab==='deal')renderDeal();

    if(n){
      const hidden = n > examples.length ? `\n+ ${n - examples.length} more updated` : '';
      alert(`CSV price update complete\n${n} standard prices updated.\n\nChanged:\n${examples.join('\n')}${hidden}\n\nManual project overrides were kept.`);
    }else{
      alert('No prices were updated. Make sure the CSV has matching item ids like ig-01, kt-13, ba-04 and a cost column.');
    }
  };
  reader.readAsText(file);
  this.value='';
};

// Service Worker helper
// v47: main registration moved to the top of the file so iOS can install it before the heavy app scripts finish.
if('serviceWorker' in navigator && location.protocol !== 'file:'){
  const pingSparkWorker=()=>{
    if(navigator.serviceWorker.controller){
      navigator.serviceWorker.controller.postMessage({type:'CACHE_URLS',urls:[location.href, location.origin + location.pathname, './', './index.html']});
    }
  };
  navigator.serviceWorker.ready.then(pingSparkWorker).catch(()=>{});
  window.addEventListener('load',()=>setTimeout(pingSparkWorker,1000),{once:true});
}

  const html=document.documentElement;
  const isLight=html.getAttribute('data-theme')==='light';
  html.setAttribute('data-theme',isLight?'dark':'light');
  try{localStorage.setItem('spark_theme',isLight?'dark':'light')}catch(e){}
}
function loadTheme(){
  try{
    const t=localStorage.getItem('spark_theme')||'dark';
    document.documentElement.setAttribute('data-theme',t);
  }catch(e){}
}
