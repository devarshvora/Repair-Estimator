// DEMO DATA LOADER  (randomized, research-based)
// ─────────────────────────────────────────────
// Based on real house-flip data:
// - Vinyl plank flooring: ~$2.50/sqft installed (Lex Levinrad avg)
// - Interior paint: ~$2.95/sqft (Spark pricing list)
// - Kitchen refresh (labor+cabinets): $1,100-$1,500 flat
// - Granite countertops: $35-40/LF installed
// - New appliances: range $725, dishwasher $575, microwave $500
// - Bathroom reglaze: $350-$750 per unit
// - Furnace replacement: $3,350 (Spark list)
// - Water heater: $1,425 (Spark list)
// - Roof: $1,100 per 225 sqft (Spark list)

function loadDemoData(){
  const p=P();if(!p)return;

  // Pick a random scenario
  const sc=DEMO_SCENARIOS[Math.floor(Math.random()*DEMO_SCENARIOS.length)];

  // Rename project to scenario address
  p.name=sc.name;

  // Set deal inputs (rounded, logical)
  const arv=sc.arvBase;
  const purchase=Math.round(arv*sc.purchasePct/1000)*1000;
  const hold=Math.round(sc.holdMonths*sc.holdPerMonth/100)*100;
  p.deal={arv:String(arv),purchase:String(purchase),hold:String(hold)};

  // Reset all items first
  p.rooms.forEach(r=>r.groups.forEach(g=>{g.noAction=false;g.items.forEach(it=>{it.checked=false;it.qty=1;});}));

  // Helper: check item in a room/group
  function check(roomType,groupTid,itemId,qty){
    const room=p.rooms.find(r=>r.typeId===roomType);if(!room)return;
    const g=room.groups.find(x=>x.tid===groupTid);if(!g)return;
    const it=g.items.find(x=>x.id===itemId);if(!it)return;
    it.checked=true;it.qty=qty||1;g.noAction=false;
  }

  // Helper: mark group no-action
  function noAct(roomType,groupTid){
    const room=p.rooms.find(r=>r.typeId===roomType);if(!room)return;
    const g=room.groups.find(x=>x.tid===groupTid);if(!g)return;
    g.noAction=true;g.items.forEach(i=>{i.checked=false;});
  }

  // Apply interior scope
  const rInt=sc.rooms.interior;
  if(rInt.flooring)check('interior','flooring',rInt.flooring.id,rInt.flooring.qty);
  if(rInt.paint)check('interior','paint',rInt.paint.id,rInt.paint.qty);
  if(rInt.doors){
    rInt.doors.ids.forEach((id,i)=>check('interior','doors',id,rInt.doors.qty[i]));
  }
  if(rInt.pest)check('interior','pest',rInt.pest.id,rInt.pest.qty||1);
  if(Array.isArray(rInt.misc))rInt.misc.forEach(m=>check('interior','misc',m.id,m.qty||1));
  else if(rInt.misc)check('interior','misc',rInt.misc.id,rInt.misc.qty||1);

  // Apply kitchen scope
  const rKit=sc.rooms.kitchen;
  if(rKit){
    if(rKit.cabinets){
      if(Array.isArray(rKit.cabinets))rKit.cabinets.forEach(c=>check('kitchen','cabinets',c.id,c.qty||1));
      else check('kitchen','cabinets',rKit.cabinets.id,rKit.cabinets.qty||1);
    }
    if(rKit.counters)rKit.counters.forEach(c=>check('kitchen','counters',c.id,c.qty));
    if(rKit.appliances)rKit.appliances.forEach(a=>check('kitchen','appliances',a.id,a.qty||1));
  }

  // Apply bathroom scope
  const rBath=sc.rooms.bathroom;
  if(rBath){
    const ba=p.rooms.find(r=>r.typeId==='bathroom');
    if(ba){
      if(rBath.tub){const g=ba.groups.find(x=>x.tid==='tub');if(g){const it=g.items.find(i=>i.id===rBath.tub.id);if(it){it.checked=true;it.qty=rBath.tub.qty||1;g.noAction=false;}}}
      if(rBath.vanity){
        if(Array.isArray(rBath.vanity))rBath.vanity.forEach(v=>{const g=ba.groups.find(x=>x.tid==='vanity');if(g){const it=g.items.find(i=>i.id===v.id);if(it){it.checked=true;it.qty=v.qty||1;}}});
        else{const g=ba.groups.find(x=>x.tid==='vanity');if(g){const it=g.items.find(i=>i.id===rBath.vanity.id);if(it){it.checked=true;it.qty=rBath.vanity.qty||1;}}}
      }
      if(rBath.tile){const g=ba.groups.find(x=>x.tid==='tile');if(g){const it=g.items.find(i=>i.id===rBath.tile.id);if(it){it.checked=true;it.qty=rBath.tile.qty||1;}}}
      if(rBath.noActionGroups)rBath.noActionGroups.forEach(tid=>{const g=ba.groups.find(x=>x.tid===tid);if(g){g.noAction=true;g.items.forEach(i=>{i.checked=false;});}});
    }
  }

  // Apply exterior scope
  const rExt=sc.rooms.exterior;
  if(rExt){
    if(rExt.noAction)rExt.noAction.forEach(tid=>noAct('exterior',tid));
    if(rExt.siding)rExt.siding.forEach(s=>check('exterior','siding',s.id,s.qty||1));
    if(rExt.windows)rExt.windows.forEach(w=>check('exterior','windows',w.id,w.qty||1));
    if(rExt.garage)rExt.garage.forEach(g=>check('exterior','garage',g.id,g.qty||1));
    if(rExt.trees)rExt.trees.forEach(t=>check('exterior','trees',t.id,t.qty||1));
  }

  // Apply systems scope
  const rSys=sc.rooms.systems;
  if(rSys){
    if(rSys.noAction)rSys.noAction.forEach(tid=>noAct('systems',tid));
    if(rSys.hvac)rSys.hvac.forEach(h=>check('systems','hvac',h.id,h.qty||1));
    if(rSys.electric)rSys.electric.forEach(e=>check('systems','electric',e.id,e.qty||1));
    if(rSys.structural)rSys.structural.forEach(s=>check('systems','structural',s.id,s.qty||1));
    if(rSys.insulation)rSys.insulation.forEach(i=>check('systems','insulation',i.id,i.qty||1));
  }

  // Apply bedroom scope
  const rBed=sc.rooms.bedroom;
  if(rBed){
    if(rBed.flooring)check('bedroom','flooring',rBed.flooring.id,rBed.flooring.qty);
    if(rBed.paint)check('bedroom','paint',rBed.paint.id,rBed.paint.qty);
    if(rBed.doors){
      if(Array.isArray(rBed.doors))rBed.doors.forEach(d=>check('bedroom','doors',d.id,d.qty||1));
      else check('bedroom','doors',rBed.doors.id,rBed.doors.qty||1);
    }
    if(rBed.noAction)rBed.noAction.forEach(tid=>noAct('bedroom',tid));
  }

  // Apply living scope
  const rLiv=sc.rooms.living;
  if(rLiv){
    if(rLiv.flooring)check('living','flooring',rLiv.flooring.id,rLiv.flooring.qty);
    if(rLiv.paint)check('living','paint',rLiv.paint.id,rLiv.paint.qty);
    if(rLiv.doors){
      if(Array.isArray(rLiv.doors))rLiv.doors.forEach(d=>check('living','doors',d.id,d.qty||1));
      else check('living','doors',rLiv.doors.id,rLiv.doors.qty||1);
    }
    if(rLiv.lighting){
      if(Array.isArray(rLiv.lighting))rLiv.lighting.forEach(l=>check('living','lighting',l.id,l.qty||1));
    }
    if(rLiv.noAction)rLiv.noAction.forEach(tid=>noAct('living',tid));
  }

  p.photos=[];
  save();
  updateHeader();
  if(currentTab==='rooms')renderRooms();
  else renderSummary();

  const totalRepair=projectTotal(p);
  const mao=Math.round((arv*0.7-totalRepair)/1000)*1000;
  alert(
    'Demo loaded: ' + sc.name + '\n' +
    'Scope: ' + sc.scope.toUpperCase() + ' rehab (' + sc.sqft + ' sqft)\n\n' +
    'Repair estimate: $' + totalRepair.toLocaleString() + '\n' +
    'Purchase price: $' + purchase.toLocaleString() + '\n' +
    'ARV: $' + arv.toLocaleString() + '\n' +
    '70% Rule MAO: $' + mao.toLocaleString() + '\n\n' +
    'Open Offer Check to review the numbers before submitting.'
  );
}

</script>
